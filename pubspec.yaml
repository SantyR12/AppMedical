name: sgp_app
description: "Sistema de Gestión de Pacientes — SGP · Sprint 1 · Abril–Mayo 2025"
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ^3.8.0

# =============================================================================
# DEPENDENCIAS DE PRODUCCIÓN
# =============================================================================
dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------------------------------
  # NAVEGACIÓN
  # go_router — mantenido por el equipo de Flutter, soporta deep links,
  # redirección basada en estado de auth (PB-07), rutas por rol.
  # ---------------------------------------------------------------------------
  go_router: ^17.2.2

  # ---------------------------------------------------------------------------
  # ESTADO Y GESTIÓN DE DATOS
  # flutter_riverpod — inyección de dependencias + estado reactivo.
  # Cada módulo (auth, historial, alergias) tiene sus propios providers
  # sin interferir con los demás → ideal para el trabajo en paralelo.
  # ---------------------------------------------------------------------------
  flutter_riverpod: ^2.5.1

  # ---------------------------------------------------------------------------
  # HTTP / API
  # dio — cliente HTTP con interceptores. Se usa para:
  #   • Agregar el header Authorization: Bearer <JWT> en cada request (PB-06)
  #   • Renovar automáticamente el JWT cuando queda < 5 min (PB-06)
  #   • Manejar errores de red de forma centralizada
  # ---------------------------------------------------------------------------
  dio: ^5.9.2

  # ---------------------------------------------------------------------------
  # ALMACENAMIENTO SEGURO
  # flutter_secure_storage — guarda el JWT y el refresh token en:
  #   • Android: EncryptedSharedPreferences / Keystore
  #   • iOS: Keychain
  # Requerido por PB-06 (refresh token almacenado de forma segura).
  # ---------------------------------------------------------------------------
  flutter_secure_storage: ^10.0.0

  # ---------------------------------------------------------------------------
  # JWT
  # jwt_decoder — decodifica y verifica expiración del JWT en el cliente.
  # Usado para detectar cuándo faltan < 5 min para renovar (PB-06).
  # ---------------------------------------------------------------------------
  jwt_decoder: ^2.0.1

  # ---------------------------------------------------------------------------
  # SERIALIZACIÓN DE MODELOS
  # freezed_annotation + json_annotation — generan clases inmutables con
  # copyWith, equals y fromJson/toJson. Útil para: UserModel, PatientModel,
  # AllergyModel, PrescriptionModel.
  # ---------------------------------------------------------------------------
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ---------------------------------------------------------------------------
  # INTERNACIONALIZACIÓN
  # intl — formatos de fecha (DD/MM/AAAA requerido en PB-10, PB-14) y
  # localización en español (Colombia).
  # flutter_localizations — traducciones de Material widgets al español.
  # ---------------------------------------------------------------------------
  intl: any
  flutter_localizations:
    sdk: flutter

  # ---------------------------------------------------------------------------
  # UI / COMPONENTES
  # ---------------------------------------------------------------------------

  # Iconos de Material Design 3
  material_design_icons_flutter: ^7.0.7296

  # PIN / OTP input — campo de 6 dígitos para el MFA (PB-04)
  pinput: ^6.0.2

  # Selector de fecha nativo — usado en datos demográficos (PB-10)
  # y en el formulario de alergias (PB-20)
  flutter_datetime_picker_bdaya: ^3.0.2

  # Autocompletado de medicamentos — buscador con sugerencias para
  # prescripciones (PB-15) y alergias (PB-20)
  flutter_typeahead: ^6.0.0

  # Formularios con validación reactiva (alternativa a Form nativo)
  reactive_forms: ^18.2.2

  # Pull-to-refresh en listas de pacientes (PB-14)
  easy_refresh: ^3.4.0

  # Shimmer de carga — skeleton screens mientras carga la historia clínica
  shimmer: ^3.0.0

  # Snackbars / toasts de confirmación y error
  fluttertoast: ^9.0.0

# =============================================================================
# DEPENDENCIAS DE DESARROLLO
# =============================================================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Generación de código para freezed y json_serializable
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5

  # Generación de providers Riverpod con anotaciones @riverpod
  riverpod_annotation: ^2.4.0
  riverpod_generator: ^2.3.0

  # Mocks para tests unitarios
  mockito: ^5.4.5

# =============================================================================
# CONFIGURACIÓN DE FLUTTER
# =============================================================================
flutter:
  uses-material-design: true

  # Activa la generación automática de localizaciones (app_en.arb, app_es.arb)
  generate: true

